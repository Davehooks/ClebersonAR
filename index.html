<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Experiência Híbrida: 3D & RA</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      /* Estilização do Botão Switch */
      #switch-container {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        font-family: Arial, sans-serif;
      }
      .btn-switch {
        background: #222;
        color: white;
        border: 2px solid #4CC3D9;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        transition: all 0.3s ease;
      }
      .btn-switch:hover {
        background: #4CC3D9;
        color: #222;
      }
      /* Ajuste para o vídeo da webcam não quebrar o layout */
      body.modo-web video {
        display: none !important;
      }
    </style>

    <script>
      // Componente Lógico do Objeto Mutante (Mantido)
      AFRAME.registerComponent('forma-mutante', {
        init: function () {
          var el = this.el;
          this.formas = ['box', 'cylinder', 'cone', 'sphere'];
          this.formaAtual = 'box';

          el.addEventListener('click', function () {
            el.emit('encolher');
          });

          el.addEventListener('animationcomplete__encolher', () => {
            let novaForma;
            do {
              novaForma = this.formas[Math.floor(Math.random() * this.formas.length)];
            } while (novaForma === this.formaAtual);

            this.formaAtual = novaForma;
            el.setAttribute('geometry', 'primitive', novaForma);
            el.setAttribute('material', 'color', this.getRandomColor());
            el.emit('crescer');
          });
        },
        getRandomColor: function () {
          var letters = '0123456789ABCDEF';
          var color = '#';
          for (var i = 0; i < 6; i++) color += letters[Math.floor(Math.random() * 16)];
          return color;
        }
      });

      // Lógica do Switch de Modo
      window.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('btnMode');
        const cena = document.querySelector('a-scene');
        const objeto = document.getElementById('objeto');
        const marcador = document.getElementById('marcador-hiro');
        const cameraWeb = document.getElementById('camera-web');
        
        let modoAR = false; // Começa no modo Web 3D padrão

        btn.addEventListener('click', () => {
          modoAR = !modoAR;

          if (modoAR) {
            // --- ATIVAR MODO REALIDADE AUMENTADA ---
            btn.innerText = "Mudar para Modo 3D";
            document.body.classList.remove('modo-web');
            
            // Desativa a câmera do modo Web e ativa o sistema AR.js
            cameraWeb.setAttribute('camera', 'active', false);
            cena.setAttribute('arjs', 'sourceType: webcam; debugUIEnabled: false;');
            
            // Move o objeto para dentro do marcador de RA
            marcador.appendChild(objeto);
            objeto.setAttribute('position', '0 0.5 0');
            objeto.setAttribute('scale', '0.5 0.5 0.5');
            
            // Atualiza as animações para a escala menor do RA
            objeto.setAttribute('animation__encolher', 'property: scale; to: 0.01 0.01 0.01; dur: 400; easing: easeInBack; startEvents: encolher');
            objeto.setAttribute('animation__crescer', 'property: scale; to: 0.5 0.5 0.5; dur: 600; easing: easeOutElastic; startEvents: crescer');
            
          } else {
            // --- ATIVAR MODO WEB 3D PADRÃO ---
            btn.innerText = "Mudar para Realidade Aumentada";
            document.body.classList.add('modo-web');
            
            // Desliga a webcam do AR.js (pausa o vídeo de fundo)
            const video = document.querySelector('video');
            if (video && video.srcObject) {
              video.srcObject.getTracks().forEach(track => track.stop());
              video.remove();
            }
            cena.removeAttribute('arjs');

            // Reativa a câmera de órbita/olhar do site
            cameraWeb.setAttribute('camera', 'active', true);
            
            // Tira o objeto do marcador e joga de volta no cenário do site
            cena.appendChild(objeto);
            objeto.setAttribute('position', '0 1.5 -3');
            objeto.setAttribute('scale', '1 1 1');
            
            // Atualiza as animações para a escala maior do site
            objeto.setAttribute('animation__encolher', 'property: scale; to: 0.05 0.05 0.05; dur: 400; easing: easeInBack; startEvents: encolher');
            objeto.setAttribute('animation__crescer', 'property: scale; to: 1 1 1; dur: 600; easing: easeOutElastic; startEvents: crescer');
          }
        });
      });
    </script>
  </head>
  
  <body class="modo-web" style="margin: 0px; overflow: hidden;">

    <div id="switch-container">
      <button class="btn-switch" id="btnMode">Mudar para Realidade Aumentada</button>
    </div>

    <a-scene background="color: #ECECEC">
      
      <a-entity id="camera-web" camera look-controls position="0 1.6 0">
        <a-cursor id="cursor-web" raycaster="objects: .clicavel" material="color: #000"></a-cursor>
      </a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>

      <a-marker id="marcador-hiro" preset="hiro"></a-marker>

      <a-entity 
        id="objeto"
        class="clicavel"
        forma-mutante
        geometry="primitive: box" 
        material="color: #4CC3D9" 
        position="0 1.5 -3"
        scale="1 1 1"
        
        animation__encolher="property: scale; to: 0.05 0.05 0.05; dur: 400; easing: easeInBack; startEvents: encolher"
        animation__crescer="property: scale; to: 1 1 1; dur: 600; easing: easeOutElastic; startEvents: crescer"
        animation__rodar="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
      </a-entity>

    </a-scene>
  </body>
</html>
