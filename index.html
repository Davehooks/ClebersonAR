<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <title>Experiência Híbrida: 3D & RA</title>
    <style>
      body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; font-family: Arial, sans-serif;
        background-color: #000;
      }
      /* O iframe ocupa a tela toda atrás do botão */
      iframe {
        width: 100%; height: 100%; border: none;
        display: block;
      }
      #switch-container {
        position: fixed; bottom: 25px; left: 50%;
        transform: translateX(-50%); z-index: 9999;
      }
      .btn-switch {
        background: #222; color: white; border: 2px solid #4CC3D9;
        padding: 14px 28px; font-size: 16px; font-weight: bold;
        border-radius: 30px; cursor: pointer;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        transition: all 0.3s ease;
      }
      .btn-switch:hover {
        background: #4CC3D9; color: #222;
      }
    </style>
  </head>
  <body>

    <div id="switch-container">
      <button class="btn-switch" id="btnMode">Mudar para Realidade Aumentada</button>
    </div>

    <iframe id="viewer" src="modo-web.html"></iframe>

    <script>
      const btn = document.getElementById('btnMode');
      const iframe = document.getElementById('viewer');
      let modoAR = false;

      btn.addEventListener('click', () => {
        modoAR = !modoAR;
        if (modoAR) {
          btn.innerText = "Mudar para Modo 3D";
          iframe.src = "modo-ra.html"; // Carrega a cena de RA (ativa a câmera na hora)
        } else {
          btn.innerText = "Mudar para Realidade Aumentada";
          iframe.src = "modo-web.html"; // Desliga a câmera e volta pro 3D clássico
        }
      });
    </script>
  </body>
</html>
