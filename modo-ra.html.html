<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
      AFRAME.registerComponent('forma-mutante', {
        init: function () {
          var el = this.el;
          this.formas = ['box', 'cylinder', 'cone', 'sphere'];
          this.formaAtual = 'box';
          el.addEventListener('click', () => el.emit('encolher'));
          el.addEventListener('animationcomplete__encolher', () => {
            let novaForma;
            do {
              novaForma = this.formas[Math.floor(Math.random() * this.formas.length)];
            } while (novaForma === this.formaAtual);
            this.formaAtual = novaForma;
            el.setAttribute('geometry', 'primitive', novaForma);
            el.setAttribute('material', 'color', '#'+Math.floor(Math.random()*16777215).toString(16));
            el.emit('crescer');
          });
        }
      });
    </script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        <a-entity id="objeto" class="clicavel" forma-mutante geometry="primitive: box" material="color: #4CC3D9" position="0 0.5 0" scale="0.5 0.5 0.5"
          animation__encolher="property: scale; to: 0.01 0.01 0.01; dur: 400; easing: easeInBack; startEvents: encolher"
          animation__crescer="property: scale; to: 0.5 0.5 0.5; dur: 600; easing: easeOutElastic; startEvents: crescer"
          animation__rodar="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        </a-entity>
      </a-marker>

      <a-entity camera>
        <a-cursor raycaster="objects: .clicavel" material="color: red"></a-cursor>
      </a-entity>
    </a-scene>
  </body>
</html>
